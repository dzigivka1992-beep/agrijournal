<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<title>AgriJournal Заболотне</title>

<style>
body {
  font-family: Arial;
  background: #f5f6f7;
  margin: 0;
}

.hidden { display: none; }

.card {
  width: 320px;
  margin: 100px auto;
  padding: 25px;
  background: white;
  border-radius: 12px;
  text-align: center;
  box-shadow: 0 10px 30px rgba(0,0,0,0.1);
}

input {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border-radius: 8px;
  border: 1px solid #ddd;
}

button {
  margin-top: 15px;
  width: 100%;
  padding: 12px;
  border: none;
  background: #1c7c3c;
  color: white;
  border-radius: 8px;
  font-weight: bold;
  cursor: pointer;
}

header {
  background: white;
  padding: 15px;
  display: flex;
  justify-content: space-between;
  border-bottom: 1px solid #ddd;
}

table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 20px;
}

td, th {
  padding: 10px;
  border-bottom: 1px solid #eee;
}
</style>
</head>

<body>

<!-- 🔐 LOGIN -->
<div id="login" class="card">
  <h2>AgriJournal</h2>
  <p>Заболотне</p>

  <input id="loginInput" placeholder="Логін">
  <input id="passwordInput" type="password" placeholder="Пароль">

  <button id="loginBtn">Увійти</button>
</div>

<!-- 🚜 APP -->
<div id="app" class="hidden">

  <header>
    <div>AgriJournal Заболотне</div>
    <button id="logoutBtn">Вийти</button>
  </header>

  <div style="padding:20px">

    <table>
      <thead>
        <tr>
          <th>Дата</th>
          <th>Поле</th>
          <th>Операція</th>
          <th>Гектари</th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>

  </div>

</div>

<script>

// 👤 Користувачі
const USERS = [
  { login: 'admin', password: 'agro2026' },
  { login: 'agronom1', password: 'field2026' },
  { login: 'agronom2', password: 'soil2026' }
];

// 📊 ТЕСТ ДАНІ (потім підключимо Google Sheets)
const DATA = [
  { date: '16.03.2026', field: 'Жабокрич 47', op: 'Рихлення', ha: 28 },
  { date: '16.03.2026', field: 'Жабокрич 54', op: 'Рихлення', ha: 10 }
];

function el(id) {
  return document.getElementById(id);
}

// 🔐 ЛОГІН
function doLogin() {
  const login = el('loginInput').value.trim();
  const password = el('passwordInput').value;

  const user = USERS.find(u => u.login === login && u.password === password);

  if (user) {
    localStorage.setItem('auth', 'true');
    el('login').classList.add('hidden');
    el('app').classList.remove('hidden');
    renderTable();
  } else {
    alert('Невірний логін або пароль');
  }
}

// 🚪 ЛОГАУТ
function logout() {
  localStorage.removeItem('auth');
  location.reload();
}

// 📊 РЕНДЕР ТАБЛИЦІ
function renderTable() {
  const tbody = el('tableBody');
  tbody.innerHTML = '';

  DATA.forEach(row => {
    tbody.innerHTML += `
      <tr>
        <td>${row.date}</td>
        <td>${row.field}</td>
        <td>${row.op}</td>
        <td>${row.ha}</td>
      </tr>
    `;
  });
}

// 🔗 ПОДІЇ
function bindEvents() {
  el('loginBtn').addEventListener('click', doLogin);

  el('passwordInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') doLogin();
  });

  el('logoutBtn').addEventListener('click', logout);
}

// 🚀 СТАРТ
function init() {
  const auth = localStorage.getItem('auth') === 'true';

  if (auth) {
    el('login').classList.add('hidden');
    el('app').classList.remove('hidden');
    renderTable();
  }

  bindEvents();
}

init();

</script>

</body>
</html>
